<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب | جارك أولى</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<main class="login-box">


<div class="logo">
🤝
</div>


<h1>
حساب جديد 🌿
</h1>


<p>
سجل بياناتك وانضم لمجتمع جارك أولى.
</p>



<form>


<label>
الاسم
</label>

<input 
id="name"
type="text" 
placeholder="اكتب اسمك">



<label>
رقم التواصل
</label>

<input 
id="phone"
type="tel" 
placeholder="رقم الهاتف">



<label>
المدينة
</label>

<input 
id="city"
type="text" 
placeholder="اكتب مدينتك">



<label>
كلمة المرور
</label>

<input 
id="password"
type="password" 
placeholder="اكتب كلمة المرور">



<label>
تأكيد كلمة المرور
</label>

<input 
id="confirmPassword"
type="password" 
placeholder="أعد كتابة كلمة المرور">



<button 
type="button"
class="btn"
onclick="register()">

إنشاء الحساب ✨

</button>


</form>



<p class="create">

عندك حساب؟

<a href="login.html">
تسجيل الدخول
</a>

</p>


</main>


<script src="js/script.js"></script>


</body>

  </html>
