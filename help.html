<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>بقدر أساعد | جارك أولى</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="page-header">

<h1>
🙋 بقدر أساعد
</h1>

<p>
عندك مهارة؟ خلي الناس تستفيد منها 🌿
</p>

</header>

<main class="form-container">

<form>

<label>
الاسم
</label>

<input id="name" type="text" placeholder="اكتب اسمك">

<label>
نوع المهارة
</label>

<input id="skill" type="text" placeholder="مثلاً: برمجة، تدريس، صيانة">

<label>
وصف الخدمة
</label>

<textarea id="description" placeholder="أكتب نبذة عن المساعدة التي تقدمها"></textarea>

<label>
المدينة
</label>

<input id="city" type="text" placeholder="اكتب مدينتك">

<label>
رقم التواصل
</label>

<input id="phone" type="tel" placeholder="رقم الهاتف">

<button type="button" class="btn" onclick="addService()">
نشر المساعدة 🌿
</button>

</form>

</main>

<script src="js/script.js"></script>

</body>

  </html>
