<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>محتاج مساعدة | جارك أولى</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header class="page-header">

<h1>🆘 محتاج مساعدة</h1>

<p>
اعرض طلبك وخلي الزول المناسب يلقاك 🌿
</p>

</header>

<main class="form-container">

<form>

<label>عنوان الطلب</label>

<input
id="title"
type="text"
placeholder="مثلاً: محتاج مساعدة في صيانة">

<label>وصف المشكلة</label>

<textarea
id="problem"
placeholder="أكتب تفاصيل طلبك"></textarea>

<label>نوع المساعدة</label>

<input
id="type"
type="text"
placeholder="مثلاً: تعليم، نقل، صيانة">

<label>المدينة</label>

<input
id="cityHelp"
type="text"
placeholder="اكتب مدينتك">

<label>وسيلة التواصل</label>

<input
id="contact"
type="text"
placeholder="رقم الهاتف أو طريقة التواصل">

<button
type="button"
class="btn"
onclick="addHelpRequest()">
نشر الطلب 🆘
</button>

</form>

</main>

<script src="js/script.js"></script>

</body>

</html>
