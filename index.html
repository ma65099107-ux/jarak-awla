<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تسجيل الدخول | جارك أولى</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<main class="login-box">

<div class="logo">
🤝
</div>

<h1>
جارك أولى 🌿
</h1>

<p>
أهلاً بيك، سجل دخولك عشان نبدأ الخير.
</p>

<form>

<label>
اسم المستخدم
</label>

<input
id="username"
type="text"
placeholder="اكتب اسمك">

<label>
كلمة المرور
</label>

<input
id="password"
type="password"
placeholder="اكتب كلمة المرور">

<button
type="button"
class="btn"
onclick="login()">
دخول ✨
</button>

</form>

<p class="create">

ما عندك حساب؟

<a href="register.html">
إنشاء حساب
</a>

</p>

</main>

<script src="js/script.js"></script>

</body>

</html>
